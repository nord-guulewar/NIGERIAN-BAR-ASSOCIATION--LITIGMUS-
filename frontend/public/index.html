<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Essential SEO Tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Title & Description -->
    <title>NBA LITIGMUS | Nigerian Bar Association Case Management System | Court Management Software</title>
    <meta name="description" content="NBA LITIGMUS - Advanced case management system for Nigerian courts. Automated case assignment, payment tracking, docket generation, and comprehensive reporting. Trusted by Nigerian courts and judicial officers." />
    <meta name="keywords" content="Nigerian Bar Association, NBA LITIGMUS, Court Management System, Case Management, Judicial System, Nigerian Courts, Legal Technology, Case Tracking" />
    <meta name="author" content="Nigerian Bar Association" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- OpenGraph for Social Sharing -->
    <meta property="og:title" content="NBA LITIGMUS | Nigerian Bar Association Case Management System" />
    <meta property="og:description" content="Advanced case management system for Nigerian courts with automated case assignment, payment tracking, and comprehensive reporting." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nbalitigmus.ng" />
    <meta property="og:image" content="%PUBLIC_URL%/logo192.png" />
    <meta property="og:site_name" content="NBA LITIGMUS" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NBA LITIGMUS | Case Management System" />
    <meta name="twitter:description" content="Advanced case management system for Nigerian courts" />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo192.png" />
    
    <!-- Branding & Theme -->
    <meta name="theme-color" content="#08111f" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Performance & Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://api.nbalitigmus.ng">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://nbalitigmus.ng" />
    
    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NBA LITIGMUS",
      "description": "Case Management System for Nigerian Courts",
      "applicationCategory": "BusinessApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "NGN"
      },
      "author": {
        "@type": "Organization",
        "name": "Nigerian Bar Association"
      }
    }
    </script>
    
    <style>
      /* NBA Branded Loading Screen */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #08111f;
        color: #dbe6f4;
      }


      /* NBA Loading Screen */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at top left, rgba(224, 197, 128, 0.14), transparent 24%),
          linear-gradient(180deg, #07101c 0%, #08111f 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .nba-logo {
        width: 120px;
        height: 120px;
        background: rgba(16, 27, 45, 0.96);
        border: 1px solid rgba(224, 197, 128, 0.18);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 30px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        animation: pulse 2s ease-in-out infinite;
      }

      .nba-logo svg {
        width: 80px;
        height: 80px;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
      }

      .loading-text {
        color: #f8fafc;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
        text-align: center;
        letter-spacing: 1px;
      }

      .loading-subtitle {
        color: #a9bad0;
        font-size: 16px;
        margin-bottom: 30px;
        text-align: center;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(224, 197, 128, 0.22);
        border-top-color: #e0c580;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .nba-footer {
        position: absolute;
        bottom: 30px;
        color: rgba(169, 186, 208, 0.7);
        font-size: 14px;
        text-align: center;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }

      /* Hide loading screen when React loads */
      #root:not(:empty) ~ #loading-screen {
        display: none;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 40px; text-align: center; font-family: Arial, sans-serif;">
        <h1 style="color: #1a472a;">⚠️ JavaScript Required</h1>
        <p>You need to enable JavaScript to run the NBA LITIGMUS Case Management System.</p>
        <p>Please enable JavaScript in your browser settings and reload the page.</p>
      </div>
    </noscript>
    
    <!-- React App Root -->
    <div id="root"></div>
    
    <!-- NBA Branded Loading Screen -->
    <div id="loading-screen">
      <div class="nba-logo">
        <!-- Lady Justice Statue Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
          <!-- Head -->
          <circle cx="32" cy="12" r="4" fill="#e0c580"/>
          
          <!-- Blindfold -->
          <rect x="28" y="11" width="8" height="1.5" fill="#e0c580"/>
          
          <!-- Body/Robe -->
          <path d="M32 16 L28 20 L26 32 L26 42 L28 44 L36 44 L38 42 L38 32 L36 20 Z" fill="#e0c580"/>
          
          <!-- Left Arm holding Scales -->
          <line x1="28" y1="20" x2="20" y2="24" stroke="#e0c580" stroke-width="1.5"/>
          
          <!-- Right Arm holding Sword -->
          <line x1="36" y1="20" x2="44" y2="24" stroke="#e0c580" stroke-width="1.5"/>
          
          <!-- Scales - Left Pan -->
          <circle cx="16" cy="24" r="3" fill="none" stroke="#d4af37" stroke-width="1"/>
          <line x1="13" y1="24" x2="19" y2="24" stroke="#d4af37" stroke-width="1"/>
          
          <!-- Scales - Right Pan -->
          <circle cx="24" cy="24" r="3" fill="none" stroke="#d4af37" stroke-width="1"/>
          <line x1="21" y1="24" x2="27" y2="24" stroke="#d4af37" stroke-width="1"/>
          
          <!-- Scales - Balance Beam -->
          <line x1="16" y1="24" x2="24" y2="24" stroke="#d4af37" stroke-width="1.5"/>
          <line x1="20" y1="24" x2="20" y2="26" stroke="#d4af37" stroke-width="1"/>
          
          <!-- Sword - Blade -->
          <line x1="44" y1="24" x2="44" y2="38" stroke="#d4af37" stroke-width="2"/>
          
          <!-- Sword - Handle -->
          <rect x="42.5" y="22" width="3" height="3" fill="#e0c580"/>
          
          <!-- Sword - Cross Guard -->
          <line x1="40" y1="24" x2="48" y2="24" stroke="#d4af37" stroke-width="1.5"/>
          
          <!-- Base/Platform -->
          <rect x="24" y="44" width="16" height="2" fill="#1a472a"/>
          <path d="M22 46 L42 46 L40 48 L24 48 Z" fill="#1a472a"/>
        </svg>
      </div>
      
      <div class="loading-text">NBA LITIGMUS</div>
      <div class="loading-subtitle">Nigerian Bar Association Case Management System</div>
      
      <div class="loading-spinner"></div>
      
      <div class="nba-footer">
        <div style="margin-bottom: 5px;">🏛️ Justice • Technology • Excellence</div>
        <div>© 2026 Nigerian Bar Association. All Rights Reserved.</div>
      </div>
    </div>

    <script>
      // Remove loading screen when React app loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.classList.add('fade-out');
            setTimeout(function() {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
