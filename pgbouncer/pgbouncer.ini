[databases]
; Route all connections to the Postgres primary.
; In docker-compose the service name resolves via Docker DNS.
; For a remote managed DB, replace "postgres" with the actual hostname.
nba_litigmus = host=${POSTGRES_HOST:-postgres} port=5432 dbname=${POSTGRES_DB:-nba_litigmus}

[pgbouncer]
; ── Mode ──────────────────────────────────────────────────────────────────────
; transaction pooling: a backend connection is held only for the duration of
; one transaction, then returned to the pool.  This is the correct mode when
; using session-level settings (SET LOCAL / set_config with is_local=true).
; Do NOT use "session" mode with large PM2 clusters — it gives no benefit over
; direct connections.
pool_mode = transaction

; ── Connection limits ─────────────────────────────────────────────────────────
; max_client_conn: how many application-side connections PgBouncer accepts.
; Set high — these are cheap (no Postgres backend per client).
max_client_conn = 500

; default_pool_size: number of actual Postgres backend connections per database.
; Keep this to 80 so Postgres stays under its default max_connections = 100
; (leaving 20 for admin/monitoring tools).
default_pool_size = 80

; Reserve pool used when default_pool is exhausted.  Gives short-lived bursts
; room to breathe without permanently raising the pool.
reserve_pool_size = 10
reserve_pool_timeout = 3

; ── Timeouts ──────────────────────────────────────────────────────────────────
server_connect_timeout = 15
server_idle_timeout = 60
client_idle_timeout = 300
query_timeout = 30
query_wait_timeout = 15

; ── Authentication ────────────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; ── Networking ────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 5432
unix_socket_dir = /tmp

; ── Logging ───────────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; ── Admin console ─────────────────────────────────────────────────────────────
; Access the pgbouncer admin DB for SHOW STATS, SHOW POOLS, etc.
admin_users = pgbouncer_admin
