name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nba_litigmus_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nba_litigmus_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nba_litigmus_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nba_litigmus_ci
      SEQUELIZE_SYNC: "false"
      JWT_SECRET: ci_jwt_secret_key_that_is_long_enough_123456
      SESSION_SECRET: ci_session_secret_key_that_is_long_enough_123456
      ENCRYPTION_KEY: ci_encryption_key_32_chars_long!!
      FRONTEND_URL: http://localhost:3000
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          until node -e "const { Client } = require('pg'); const client = new Client({ connectionString: process.env.DATABASE_URL }); client.connect().then(() => client.end()).then(() => process.exit(0)).catch(() => process.exit(1));"; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Bootstrap test database schema
        run: npm run db:bootstrap:test

      - name: Seed minimal test database
        run: npm run seed:test

      - name: Run backend smoke tests
        run: npm test -- --runInBand --runTestsByPath __tests__/envGuard.test.js __tests__/rlsCases.test.js

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          CI: "false"
          GENERATE_SOURCEMAP: "false"
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

  backend-docker:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: nba-litigmus-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-docker:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: nba-litigmus-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max